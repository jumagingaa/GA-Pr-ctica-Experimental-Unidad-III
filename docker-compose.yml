services:
  postgres:
    image: postgres:16-alpine
    container_name: sigcbqr-postgres
    environment:
      POSTGRES_DB: sigcbqr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Doctora2025
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sigcbqr-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sigcbqr.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

  api:
    build: ./sigcb-qr-api
    container_name: sigcbqr-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sigcbqr
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Doctora2025
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./SIGCB-QR
    container_name: sigcbqr-frontend
    ports:
      - "8000:80"
    environment:
      APP_NAME: "SIGCB-QR"
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
